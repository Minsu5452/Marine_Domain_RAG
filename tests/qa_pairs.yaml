- question: "해양경찰청 직원의 복제 기준은 어떻게 정해지나요?"
  gold_law: "해양경찰청 소속 경찰공무원 복제에 관한 규칙"
  gold_citations:
    - law_name: "해양경찰청 소속 경찰공무원 복제에 관한 규칙"
      article_no: "5"
  acceptable_alternatives:
    - law_name: "해양경찰청 소속 경찰공무원 복제에 관한 규칙"
      article_no: "2"
    - law_name: "해양경찰청 소속 경찰공무원 복제에 관한 규칙"
